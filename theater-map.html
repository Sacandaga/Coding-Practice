<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interactive Theater Map — Red Sea / Iran / Gulf Theater</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#060a12;--card:#0d1420;--border:#1a2538;--text:#d0d8e4;--text2:#7a8a9e;--text3:#3d4f66;--accent:#4793e0;--red:#ef5350;--amber:#ffc107;--green:#4caf50;--teal:#26c6da;--purple:#ab47bc;--sans:'DM Sans',system-ui,sans-serif;--mono:'DM Mono',monospace}
body{background:var(--bg);color:var(--text);font-family:var(--sans);overflow:hidden;height:100vh;display:flex;flex-direction:column}

.toolbar{display:flex;align-items:center;gap:16px;padding:10px 20px;background:var(--card);border-bottom:1px solid var(--border);z-index:20;flex-shrink:0}
.toolbar h1{font-size:14px;font-weight:500;white-space:nowrap}
.toolbar .sep{width:1px;height:20px;background:var(--border)}
.toolbar .status{font-size:11px;font-family:var(--mono);color:var(--text2)}
.toolbar .status .dot{width:6px;height:6px;border-radius:50%;display:inline-block;margin-right:4px}

.map-wrap{flex:1;position:relative;overflow:hidden;cursor:grab}
.map-wrap:active{cursor:grabbing}
.map-inner{transform-origin:0 0;transition:transform 0.1s ease-out;width:100%;height:100%}

.layer-panel{position:absolute;top:12px;left:12px;background:rgba(13,20,32,0.92);border:1px solid var(--border);border-radius:12px;padding:16px;width:220px;z-index:15;backdrop-filter:blur(12px);max-height:calc(100vh - 120px);overflow-y:auto}
.layer-panel h3{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);margin-bottom:10px}
.layer-item{display:flex;align-items:center;gap:8px;padding:5px 0;cursor:pointer;font-size:12px;color:var(--text2);transition:color 0.15s}
.layer-item:hover{color:var(--text)}
.layer-item input{accent-color:var(--accent);width:14px;height:14px;cursor:pointer}
.layer-item .ldot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.layer-divider{height:1px;background:var(--border);margin:8px 0}

.info-panel{position:absolute;top:12px;right:12px;background:rgba(13,20,32,0.95);border:1px solid var(--border);border-radius:12px;padding:20px;width:300px;z-index:15;backdrop-filter:blur(12px);display:none;max-height:calc(100vh - 120px);overflow-y:auto}
.info-panel.open{display:block;animation:fadeIn 0.2s ease-out}
.info-panel h3{font-size:16px;font-weight:500;color:#fff;margin-bottom:4px}
.info-panel .info-sub{font-size:12px;color:var(--text2);margin-bottom:12px}
.info-panel .info-body{font-size:13px;color:var(--text2);line-height:1.6}
.info-panel .info-close{position:absolute;top:12px;right:12px;width:28px;height:28px;border-radius:6px;border:1px solid var(--border);background:none;color:var(--text3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px}
.info-panel .info-close:hover{border-color:var(--red);color:var(--red)}
.info-row{display:flex;justify-content:space-between;padding:4px 0;font-size:12px;border-bottom:1px solid rgba(26,37,56,0.5)}
.info-row .ik{color:var(--text3)}.info-row .iv{color:var(--text);font-family:var(--mono)}
.info-tag{display:inline-block;font-size:10px;padding:2px 8px;border-radius:4px;margin:2px;font-weight:500}

.zoom-controls{position:absolute;bottom:16px;right:16px;display:flex;flex-direction:column;gap:4px;z-index:15}
.zoom-btn{width:36px;height:36px;border-radius:8px;border:1px solid var(--border);background:rgba(13,20,32,0.9);color:var(--text2);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(8px);transition:all 0.15s}
.zoom-btn:hover{border-color:var(--accent);color:var(--accent)}

.legend-bar{position:absolute;bottom:12px;left:12px;background:rgba(13,20,32,0.9);border:1px solid var(--border);border-radius:10px;padding:10px 16px;z-index:15;display:flex;gap:16px;font-size:10px;backdrop-filter:blur(8px);flex-wrap:wrap}
.legend-bar .li{display:flex;align-items:center;gap:5px;color:var(--text2)}

@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
@keyframes dashFlow{to{stroke-dashoffset:-40}}
@keyframes pulse{0%,100%{r:4;opacity:0.8}50%{r:7;opacity:0.3}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}

svg text{font-family:'DM Sans',sans-serif}
.anim-flow{animation:dashFlow 2s linear infinite}
.anim-pulse{animation:pulse 2s ease-in-out infinite}
.anim-blink{animation:blink 1.5s ease-in-out infinite}
</style>
</head>
<body>

<div class="layer-panel">
<h3>Map layers</h3>
<label class="layer-item"><input type="checkbox" checked onchange="toggleLayer('layer-geo')"><span class="ldot" style="background:#14291a"></span>Geography</label>
<label class="layer-item"><input type="checkbox" checked onchange="toggleLayer('layer-shipping')"><span class="ldot" style="background:#1a3050"></span>Shipping lanes</label>
<label class="layer-item"><input type="checkbox" checked onchange="toggleLayer('layer-chokepoints')"><span class="ldot" style="background:var(--amber)"></span>Chokepoint status</label>
<div class="layer-divider"></div>
<label class="layer-item"><input type="checkbox" checked onchange="toggleLayer('layer-naval')"><span class="ldot" style="background:var(--accent)"></span>U.S. naval positions</label>
<label class="layer-item"><input type="checkbox" checked onchange="toggleLayer('layer-targets')"><span class="ldot" style="background:var(--red)"></span>Houthi/Yemen targets</label>
<label class="layer-item"><input type="checkbox" checked onchange="toggleLayer('layer-iran-targets')"><span class="ldot" style="background:var(--red);opacity:0.6"></span>Iran targets</label>
<div class="layer-divider"></div>
<label class="layer-item"><input type="checkbox" checked onchange="toggleLayer('layer-strikes')"><span class="ldot" style="border:1.5px dashed var(--accent);background:none"></span>Strike arcs (Tomahawk)</label>
<label class="layer-item"><input type="checkbox" checked onchange="toggleLayer('layer-attacks')"><span class="ldot" style="background:var(--red);opacity:0.5"></span>Attack incidents (2023-25)</label>
<label class="layer-item"><input type="checkbox" checked onchange="toggleLayer('layer-houthi-vectors')"><span class="ldot" style="background:var(--red)"></span>Houthi attack vectors</label>
<label class="layer-item"><input type="checkbox" checked onchange="toggleLayer('layer-iran-supply')"><span class="ldot" style="background:var(--purple)"></span>Iran supply route</label>
<label class="layer-item"><input type="checkbox" checked onchange="toggleLayer('layer-yanbu')"><span class="ldot" style="background:var(--amber)"></span>Saudi oil reroute</label>
</div>

<div class="info-panel" id="infoPanel">
<button class="info-close" onclick="closeInfo()">✕</button>
<h3 id="infoTitle"></h3>
<div class="info-sub" id="infoSub"></div>
<div class="info-body" id="infoBody"></div>
</div>

<div class="zoom-controls">
<button class="zoom-btn" onclick="zoomMap(1.3)">+</button>
<button class="zoom-btn" onclick="zoomMap(0.77)">−</button>
<button class="zoom-btn" onclick="resetZoom()" style="font-size:11px">⟲</button>
</div>

<div class="legend-bar">
<span class="li"><span class="ldot" style="width:6px;height:6px;border-radius:50%;background:var(--accent)"></span>U.S. Navy</span>
<span class="li"><span class="ldot" style="width:6px;height:6px;border-radius:50%;background:var(--red)"></span>Targets / attacks</span>
<span class="li"><span class="ldot" style="width:6px;height:6px;border-radius:50%;background:var(--amber)"></span>Chokepoints / oil</span>
<span class="li"><span class="ldot" style="width:6px;height:6px;border-radius:50%;background:var(--purple)"></span>Iran supply</span>
<span class="li"><span class="ldot" style="width:6px;height:6px;border-radius:50%;background:var(--teal)"></span>U.S. bases</span>
<span class="li" style="margin-left:auto;color:var(--text3);font-size:9px">SIMULATION / TRAINING USE ONLY</span>
</div>
</div>

<script>
const infoData = {
  hormuz: {title:'Strait of Hormuz',sub:'STATUS: CLOSED since March 4, 2026',body:`<div class="info-row"><span class="ik">Width</span><span class="iv">21 miles (34 km)</span></div><div class="info-row"><span class="ik">Oil flow (normal)</span><span class="iv">20M bbl/day</span></div><div class="info-row"><span class="ik">Global oil share</span><span class="iv">~20%</span></div><div class="info-row"><span class="ik">Current traffic</span><span class="iv">Near zero</span></div><div class="info-row"><span class="ik">Closed by</span><span class="iv">IRGC drone strikes</span></div><div class="info-row"><span class="ik">Closure type</span><span class="iv">Insurance-driven halt</span></div><div style="margin-top:12px;font-size:12px;color:var(--text2);line-height:1.6">Iran achieved effective closure through cheap drone strikes on commercial vessels — not a traditional naval blockade. Shipping companies and insurers halted transits voluntarily. On March 19, the US began military operations to reopen the strait. IRGCN commander Tangsiri was killed March 26. The strait remains effectively closed as of March 31.</div><div style="margin-top:8px"><span class="info-tag" style="background:rgba(239,83,80,0.12);color:var(--red)">Critical chokepoint</span><span class="info-tag" style="background:rgba(239,83,80,0.12);color:var(--red)">Closed</span></div>`},
  bab: {title:'Bab el-Mandeb Strait',sub:'STATUS: THREATENED — Houthi capability intact',body:`<div class="info-row"><span class="ik">Width</span><span class="iv">20 miles (32 km)</span></div><div class="info-row"><span class="ik">Oil flow</span><span class="iv">~6.2M bbl/day</span></div><div class="info-row"><span class="ik">Container share</span><span class="iv">~25% of global</span></div><div class="info-row"><span class="ik">Saudi reroute</span><span class="iv">Active via Yanbu</span></div><div class="info-row"><span class="ik">Houthi attacks</span><span class="iv">100+ (Nov 23-Oct 25)</span></div><div class="info-row"><span class="ik">Current status</span><span class="iv">Open but threatened</span></div><div style="margin-top:12px;font-size:12px;color:var(--text2);line-height:1.6">With Hormuz closed, Bab el-Mandeb is now the only viable corridor for Gulf energy exports via Saudi Arabia's Yanbu pipeline reroute. The Houthis attacked 100+ vessels here from Nov 2023-Oct 2025, demonstrating proven capability. On March 28, 2026, Houthis resumed attacks on Israel and signaled that "closing Bab el-Mandeb is among our options." A dual closure would remove 30%+ of global seaborne oil.</div><div style="margin-top:8px"><span class="info-tag" style="background:rgba(255,193,7,0.12);color:var(--amber)">Threatened</span><span class="info-tag" style="background:rgba(255,193,7,0.12);color:var(--amber)">Critical reroute</span></div>`},
  suez: {title:'Suez Canal',sub:'STATUS: Reduced traffic — upstream disruption',body:`<div class="info-row"><span class="ik">Normal traffic</span><span class="iv">~74 ships/week</span></div><div class="info-row"><span class="ik">Current</span><span class="iv">~40-50 ships/week</span></div><div class="info-row"><span class="ik">Revenue impact</span><span class="iv">Egypt losing ~$5B/yr</span></div><div style="margin-top:12px;font-size:12px;color:var(--text2);line-height:1.6">Suez Canal traffic partially recovered from the 2024 lows (~35/week) after the Houthi ceasefire in May 2025, but remains below pre-crisis levels. The 2026 Iran War has introduced new uncertainty — if Bab el-Mandeb is disrupted again, Suez traffic will collapse as vessels reroute around Africa.</div>`},
  sanaa: {title:"Sana'a — Houthi Capital",sub:'Target Categories A, B, D — Multiple target types',body:`<div class="info-row"><span class="ik">Cat A</span><span class="iv">Missile storage, assembly</span></div><div class="info-row"><span class="ik">Cat B</span><span class="iv">C2 nodes, comms</span></div><div class="info-row"><span class="ik">Cat D</span><span class="iv">HVT personnel</span></div><div class="info-row"><span class="ik">Key strike</span><span class="iv">Aug 28, 2025 — cabinet killed</span></div><div class="info-row"><span class="ik">Defenses</span><span class="iv">S-75, Buk-M2 SAMs</span></div><div style="margin-top:12px;font-size:12px;color:var(--text2);line-height:1.6">The Houthi political and military capital. Site of the August 2025 Israeli strike that killed PM al-Rahawi and most of the cabinet. Senior leadership has since dispersed to rural areas in northern Yemen. Houthi air defenses around Sana'a include Soviet-era S-75 and more capable Buk-M2 systems — requiring SEAD suppression before manned strike packages.</div>`},
  hodeidah: {title:'Hodeidah Port',sub:'Category A/C — Primary Iran weapons import hub',body:`<div class="info-row"><span class="ik">Function</span><span class="iv">Iran weapons import</span></div><div class="info-row"><span class="ik">Civilian role</span><span class="iv">70% of Yemen food imports</span></div><div class="info-row"><span class="ik">Target type</span><span class="iv">Cranes, fuel, marshaling</span></div><div class="info-row"><span class="ik">Risk</span><span class="iv">Civilian harm — HIGH</span></div><div style="margin-top:12px;font-size:12px;color:var(--text2);line-height:1.6">Primary Iranian weapons import hub through which missile guidance components, UAV parts, and engines enter Houthi-controlled territory. However, the port also handles 70% of Yemen's food imports — making any strike a humanitarian and legal minefield requiring extensive LOAC review and civilian harm mitigation. Israeli strikes damaged the port in July and December 2025.</div>`},
  sadah: {title:"Sa'dah Governorate",sub:'Category A — Underground missile bunkers',body:`<div class="info-row"><span class="ik">Target type</span><span class="iv">Hardened/buried storage</span></div><div class="info-row"><span class="ik">Weapons</span><span class="iv">Burkan-2H, Quds-1</span></div><div class="info-row"><span class="ik">Strike platform</span><span class="iv">B-2 (GBU-57 MOP only)</span></div><div class="info-row"><span class="ik">Depth</span><span class="iv">200+ ft underground</span></div><div style="margin-top:12px;font-size:12px;color:var(--text2);line-height:1.6">Concentrated between 43°E-44°E / 16°N-17°N. Underground bunkers in Sa'dah require the GBU-57 Massive Ordnance Penetrator (30,000 lb) — deliverable ONLY by the B-2 Spirit stealth bomber. No other platform in the US or allied inventory can prosecute these targets. Approximately 250km north of Hodeidah, within Tomahawk range from the southern Red Sea.</div>`},
  ford: {title:'USS Gerald R. Ford (CVN-78)',sub:'Carrier Strike Group — Currently in Crete for repairs',body:`<div class="info-row"><span class="ik">Class</span><span class="iv">Ford-class CVN</span></div><div class="info-row"><span class="ik">Air wing</span><span class="iv">70-90 aircraft</span></div><div class="info-row"><span class="ik">Status</span><span class="iv">In port — Crete</span></div><div class="info-row"><span class="ik">Unit cost</span><span class="iv">~$13 billion</span></div><div style="margin-top:12px;font-size:12px;color:var(--text2);line-height:1.6">Flagship of the US carrier fleet. Currently in Crete for repairs following operations during the 2026 Iran War. Redeployment to the Red Sea is a key decision point — it would provide decisive air power for Bab el-Mandeb defense but would expose it to the same Houthi attacks that plagued USS Eisenhower (2024) and USS Truman (2025).</div>`},
  truman: {title:'USS Harry S. Truman (CVN-75)',sub:'CSG-8 — On station in the Red Sea',body:`<div class="info-row"><span class="ik">Class</span><span class="iv">Nimitz-class CVN</span></div><div class="info-row"><span class="ik">Air wing</span><span class="iv">~70 aircraft</span></div><div class="info-row"><span class="ik">Status</span><span class="iv">On station</span></div><div class="info-row"><span class="ik">Role</span><span class="iv">Strike + air superiority</span></div><div style="margin-top:12px;font-size:12px;color:var(--text2);line-height:1.6">Currently the primary US carrier in the Red Sea theater. During Operation Rough Rider (March-May 2025), Truman CSG conducted hundreds of strike sorties against Houthi targets. Tomahawk range ring shown represents the 1,550-mile reach of BGM-109 cruise missiles launched from accompanying DDGs.</div>`},
  tehran: {title:'Tehran, Iran',sub:'Under sustained US-Israeli airstrikes since Feb 28',body:`<div class="info-row"><span class="ik">Status</span><span class="iv">Under active strikes</span></div><div class="info-row"><span class="ik">Key event</span><span class="iv">Khamenei killed Feb 28</span></div><div class="info-row"><span class="ik">Internet</span><span class="iv">Blacked out</span></div><div style="margin-top:12px;font-size:12px;color:var(--text2);line-height:1.6">Iranian capital under sustained bombardment since Operation Epic Fury began. Supreme Leader Khamenei was killed in the opening Israeli decapitation strike on February 28. Power outages, internet blackout, and continued US-Israeli strikes on military infrastructure. Mojtaba Khamenei designated as successor.</div>`},
  bahrain: {title:'NSA Bahrain — 5th Fleet HQ',sub:'US Navy Fifth Fleet headquarters — struck March 1',body:`<div class="info-row"><span class="ik">Function</span><span class="iv">NAVCENT / 5th Fleet HQ</span></div><div class="info-row"><span class="ik">Struck</span><span class="iv">Iranian missile, Mar 1</span></div><div style="margin-top:12px;font-size:12px;color:var(--text2);line-height:1.6">The nerve center of US naval operations in the Middle East. Struck by an Iranian ballistic missile on March 1, 2026, as part of Iran's retaliatory strikes following Operation Epic Fury. The IRGC targeted four US bases across the Gulf.</div>`},
  ddg1:{title:'USS Gravely (DDG-107)',sub:'Arleigh Burke-class DDG — Bab el-Mandeb patrol',body:'<div style="font-size:12px;color:var(--text2);line-height:1.6">Arleigh Burke-class guided missile destroyer on patrol near the Bab el-Mandeb strait. 90-96 Mk-41 VLS cells carrying a mix of Tomahawk offensive and SM-6/SM-2 defensive missiles. Position illustrative.</div>'},
  ddg2:{title:'USS Cole (DDG-67)',sub:'Arleigh Burke-class DDG — Red Sea patrol',body:'<div style="font-size:12px;color:var(--text2);line-height:1.6">Arleigh Burke-class guided missile destroyer operating in the central Red Sea. The Cole has symbolic significance — it was the target of the October 2000 al-Qaeda attack in Aden harbor. Position illustrative.</div>'},
  djibouti:{title:'Camp Lemonnier, Djibouti',sub:'US Africa Command — primary regional base',body:'<div style="font-size:12px;color:var(--text2);line-height:1.6">The only permanent US military base in Africa. Hosts MQ-9 Reaper operations, special operations forces, and serves as the logistics hub for Red Sea and Gulf of Aden operations. Critical for ISR coverage of the Bab el-Mandeb approaches.</div>'},
  aludeid:{title:'Al Udeid Air Base, Qatar',sub:'CENTCOM forward HQ — struck March 1',body:'<div style="font-size:12px;color:var(--text2);line-height:1.6">Primary US air operations hub in the Middle East. Hosts the Combined Air Operations Center (CAOC) that coordinates all theater air operations. Struck by Iranian missiles on March 1, 2026. Damage assessment ongoing but CAOC operations have continued.</div>'},
  bandar:{title:'Bandar Abbas, Iran',sub:'Major Iranian naval base — Hormuz closure ops',body:'<div style="font-size:12px;color:var(--text2);line-height:1.6">Iran\'s largest naval base, located at the entrance to the Strait of Hormuz. Home port for IRGC Navy fast boats and the base from which Hormuz closure operations are directed. An Iranian warship (Soleimani-class corvette) was sunk here by US-Israeli airstrike on March 1.</div>'},
  saleef:{title:'Saleef Port',sub:'Secondary Iran weapons import point',body:'<div style="font-size:12px;color:var(--text2);line-height:1.6">Secondary port facility north of Hodeidah used for Iranian weapons transfers. Smaller than Hodeidah but still a significant logistics node. Targeted in Israeli strikes in September and December 2025.</div>'},
  marib:{title:'Marib Frontline',sub:'Active civil war front — Houthi vs. IRG',body:'<div style="font-size:12px;color:var(--text2);line-height:1.6">The most active front in the Yemeni civil war. Houthi forces have been attempting to capture Marib — the last major government-held city in northern Yemen — since 2020. The frontline has been largely frozen since 2022 but remains a significant drain on Houthi military resources.</div>'},
  aden:{title:'Aden',sub:'Seat of internationally recognized government',body:'<div style="font-size:12px;color:var(--text2);line-height:1.6">De facto capital of the internationally recognized Yemeni government (Presidential Leadership Council). Also the base of the Southern Transitional Council (STC), which seeks southern independence. The STC threat may be diverting Houthi attention from external operations — a key variable in the decision calculus.</div>'},
};

function showInfo(id) {
  const d = infoData[id];
  if (!d) return;
  document.getElementById('infoTitle').textContent = d.title;
  document.getElementById('infoSub').textContent = d.sub;
  document.getElementById('infoBody').innerHTML = d.body;
  document.getElementById('infoPanel').className = 'info-panel open';
}
function closeInfo() { document.getElementById('infoPanel').className = 'info-panel'; }
function toggleLayer(id) {
  const el = document.getElementById(id);
  if (el) el.style.display = el.style.display === 'none' ? '' : 'none';
}

let scale = 1, panX = 0, panY = 0, dragging = false, lastX, lastY;
const inner = document.getElementById('mapInner');
function updateTransform() { inner.style.transform = `translate(${panX}px,${panY}px) scale(${scale})`; }
function zoomMap(f) { scale = Math.max(0.5, Math.min(4, scale * f)); updateTransform(); }
function resetZoom() { scale = 1; panX = 0; panY = 0; updateTransform(); }

const wrap = document.getElementById('mapWrap');
wrap.addEventListener('mousedown', e => { if (e.target.closest('.layer-panel,.info-panel,.zoom-controls,.legend-bar')) return; dragging = true; lastX = e.clientX; lastY = e.clientY; });
window.addEventListener('mousemove', e => { if (!dragging) return; panX += e.clientX - lastX; panY += e.clientY - lastY; lastX = e.clientX; lastY = e.clientY; updateTransform(); });
window.addEventListener('mouseup', () => { dragging = false; });
wrap.addEventListener('wheel', e => { e.preventDefault(); zoomMap(e.deltaY < 0 ? 1.1 : 0.9); }, {passive: false});
./home-button.js
</body>
</html>
